<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GARL Lab Portal — Sign In</title>
  <meta name="description" content="Secure login to the GARL Laboratory Management Portal." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="toast-container"></div>

<main class="login-page">
  <div class="login-box">
    <!-- Logo -->
    <div class="login-logo">
      <div class="login-logo-icon">🧪</div>
      <div class="login-logo-text">
        <h1>GARL Lab Portal</h1>
        <p>Laboratory Management System</p>
      </div>
    </div>

    <!-- Card -->
    <div class="card card-elevated">
      <p class="login-title">Welcome back</p>
      <p class="login-subtitle">Sign in to continue to your dashboard</p>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username"
                 placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password"
                 placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <p id="login-error" class="form-error" role="alert"></p>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="login-submit">Sign In</button>
      </form>

      <!-- Demo credentials -->
      <div class="divider"></div>
      <p style="font-size:0.75rem;color:var(--txt-muted);margin-bottom:var(--sp-3);">Quick access (demo)</p>
      <div style="display:flex;flex-wrap:wrap;gap:var(--sp-2);">
        <button class="btn btn-ghost btn-sm" type="button" data-demo="admin:asdfQWER!1234">🔑 Admin</button>
        <button class="btn btn-ghost btn-sm" type="button" data-demo="user1:asdfQWER!1234">🔑 Receptionist</button>
        <button class="btn btn-ghost btn-sm" type="button" data-demo="user2:asdfQWER!1234">🔑 Lab Engineer</button>
        <button class="btn btn-ghost btn-sm" type="button" onclick="resetToCSV()" style="color:#fca5a5;border-color:rgba(239,68,68,0.2);">🔄 Reset Database</button>
      </div>
    </div>

    <p style="text-align:center;margin-top:var(--sp-6);font-size:0.75rem;color:var(--txt-muted);">
      GARL Laboratory Management Portal &copy; 2026
    </p>
  </div>
</main>

<!-- Scripts -->
<script src="js/utils.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>initLoginPage();</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geoscience Advanced Research Laboratories Portal — Sign In</title>
  <meta name="description" content="Secure login to the Geoscience Advanced Research Laboratories Geoscience & Minerals Testing Laboratory Management Portal." />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
<div id="toast-container"></div>

<main class="login-page">
  <div class="login-box">
    <!-- Logo -->
    <div class="login-logo">
      <img src="logo/logo.png" alt="Geoscience Advanced Research Laboratories Logo" style="height:52px;width:auto;object-fit:contain;border-radius:var(--r-sm);" />
      <div class="login-logo-text">
        <h1>Geoscience Advanced Research Laboratories</h1>
        <p>Geoscience & Minerals Testing Laboratory</p>
      </div>
    </div>

    <!-- Connection status (shown while loading) -->
    <div id="connection-status" class="connection-status">
      <span class="spinner"></span> Checking database connection...
    </div>

    <!-- Connection error (shown if DB unreachable) -->
    <div id="connection-error" style="display:none;"></div>

    <!-- Card -->
    <div class="card card-elevated" id="login-card">
      <p class="login-title">Welcome back</p>
      <p class="login-subtitle">Sign in to continue to your dashboard</p>

      <form id="login-form" autocomplete="on" novalidate>
        <div class="form-group">
          <label class="form-label" for="username">Username</label>
          <input class="form-control" type="text" id="username" name="username"
                 placeholder="Enter your username" autocomplete="username" />
        </div>
        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-control" type="password" id="password" name="password"
                 placeholder="Enter your password" autocomplete="current-password" />
        </div>
        <p id="login-error" class="form-error" role="alert"></p>
        <button class="btn btn-primary btn-full btn-lg" type="submit" id="login-submit">Sign In</button>
      </form>
    </div>

    <p style="text-align:center;margin-top:var(--sp-6);font-size:0.75rem;color:var(--txt-muted);">
      Geoscience Advanced Research Laboratories Geoscience & Minerals Testing Laboratory &copy; 2026
    </p>
  </div>
</main>

<!-- Scripts -->
<script src="js/supabase-client.js"></script>
<script src="js/utils.js"></script>
<script src="js/supabase.js"></script>
<script src="js/db.js"></script>
<script src="js/auth.js"></script>
<script>initLoginPage();</script>
</body>
</html>
